name: Daily DropShip Report
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  run-drophunter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Update config with secrets
        run: |
          sed -i 's/sender: "your_gmail@gmail.com"/sender: "${{ secrets.GMAIL_EMAIL }}"/' config.yaml
          sed -i 's/app_password: "xxxx xxxx xxxx xxxx"/app_password: "${{ secrets.GMAIL_APP_PASSWORD }}"/' config.yaml
          sed -i 's/recipient: "your_email@example.com"/recipient: "${{ secrets.RECIPIENT_EMAIL }}"/' config.yaml
          
      - name: Run DropHunter
        run: python main.py
        
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dropship-results
          path: data/results.db
