# ── Scoring Algorithm ──────────────────────────────────────────────────────────
scoring:
  demand_weight: 0.60       # 60% demand score
  opportunity_weight: 0.40  # 40% opportunity score
  min_price: 10             # أقل سعر مقبول ($)
  max_price: 80             # أعلى سعر مقبول ($)
  min_rating: 3.5           # أقل تقييم مقبول
  min_reviews: 50           # أقل عدد تقييمات
  top_n: 10                 # عدد الفائزين في الإيميل

